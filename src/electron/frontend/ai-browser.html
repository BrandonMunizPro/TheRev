<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rev AI Browser</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
          "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
          "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
        }
      }
    </script>
    <style>
      :root {
        --primary: #ff0000;
        --secondary: #000000;
        --accent: #ffffff;
        --bg: #1a1a1a;
        --surface: #2d2d2d;
        --text: #ffffff;
        --text-secondary: #b0b0b0;
        --ai-blue: #00ccff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: var(--surface);
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        border-bottom: 1px solid #404040;
        z-index: 100;
      }

      .rev-avatar {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: linear-gradient(135deg, #ff0000, #cc0000);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: bold;
        border: 2px solid rgba(255, 255, 255, 0.2);
        box-shadow:
          0 4px 15px rgba(255, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .rev-avatar:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5);
      }

      .header-title {
        flex: 1;
      }
      .header-title h1 {
        font-size: 18px;
        color: var(--primary);
        margin: 0;
      }
      .header-title span {
        font-size: 11px;
        color: var(--text-secondary);
      }

      .url-bar {
        flex: 2;
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .url-input {
        flex: 1;
        background: var(--bg);
        border: 1px solid #404040;
        color: var(--text);
        padding: 10px 15px;
        border-radius: 8px;
        font-size: 14px;
      }

      .url-input:focus {
        outline: none;
        border-color: var(--primary);
      }

      .go-btn {
        background: var(--primary);
        border: none;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }

      .main-container {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      .browser-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .browser-frame {
        flex: 1;
        border: none;
        width: 100%;
        background: white;
      }

      webview {
        flex: 1;
        width: 100%;
        border: none;
        background: white;
      }

      .ai-chat-panel {
        width: 400px;
        background: var(--surface);
        border-left: 1px solid #404040;
        display: flex;
        flex-direction: column;
      }

      .chat-avatar-section {
        height: 250px;
        background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        border-bottom: 1px solid #404040;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .chat-avatar-canvas {
        width: 100%;
        height: 100%;
      }

      .chat-avatar-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #888;
        text-align: center;
        padding: 20px;
      }

      .chat-avatar-placeholder .avatar-icon {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), #cc0000);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .chat-emotion-display {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 12px;
        color: #00ccff;
      }

      .emotion-buttons {
        position: absolute;
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 200px;
      }

      .chat-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .chat-header {
        padding: 15px;
        border-bottom: 1px solid #404040;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .chat-header h2 {
        font-size: 16px;
        color: var(--ai-blue);
      }

      .write-mode-toggle {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #888;
        cursor: pointer;
      }

      .write-mode-toggle input {
        cursor: pointer;
      }

      .write-mode-toggle.active {
        color: #ff6b6b;
      }

      .write-mode-toggle input:checked + span {
        color: #ff6b6b;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 200px;
      }

      .message {
        padding: 12px 15px;
        border-radius: 12px;
        max-width: 90%;
        font-size: 14px;
        line-height: 1.5;
      }

      .message.user {
        background: var(--primary);
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }

      .message.ai {
        background: var(--surface);
        border: 1px solid #404040;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }

      .message.ai .avatar {
        display: inline-block;
        margin-right: 8px;
      }

      .chat-input-area {
        padding: 15px;
        border-top: 1px solid #404040;
        display: flex;
        gap: 10px;
      }

      .chat-input {
        flex: 1;
        background: var(--bg);
        border: 1px solid #404040;
        color: var(--text);
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        resize: none;
        min-height: 50px;
        max-height: 120px;
      }

      .chat-input:focus {
        outline: none;
        border-color: var(--ai-blue);
      }

      .send-btn {
        background: var(--ai-blue);
        border: none;
        color: #000;
        padding: 12px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        align-self: flex-end;
      }

      .send-btn:hover {
        background: #00aadd;
      }

      .status-bar {
        background: var(--surface);
        padding: 8px 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        font-size: 12px;
        color: var(--text-secondary);
        border-top: 1px solid #404040;
      }

      .status-indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #00ff00;
      }
      .status-indicator.error {
        background: #ff0000;
      }
      .status-indicator.thinking {
        background: #ffa500;
        animation: pulse 1s infinite;
      }

      /* Avatar in header */
      .header-avatar {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--primary), #cc0000);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: bold;
        border: 2px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
        position: relative;
      }

      .header-avatar canvas {
        width: 100%;
        height: 100%;
        border-radius: 50%;
      }

      /* Speech bubble chat style */
      .chat-with-avatar {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        width: 100%;
      }

      .ai-message-bubble {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        width: 100%;
      }

      .ai-message-bubble .avatar-container {
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: linear-gradient(135deg, #ff0000, #cc0000);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: white;
        font-size: 14px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 3px 10px rgba(255, 0, 0, 0.3);
      }

      .ai-message-bubble .avatar-container canvas {
        width: 100%;
        height: 100%;
        border-radius: 50%;
      }

      .ai-message-bubble .speech-bubble {
        background: var(--surface);
        border: 1px solid #404040;
        border-radius: 16px;
        border-bottom-left-radius: 4px;
        padding: 10px 14px;
        max-width: 85%;
        font-size: 14px;
        line-height: 1.5;
        position: relative;
      }

      .ai-message-bubble .speech-bubble::before {
        content: '';
        position: absolute;
        left: -8px;
        top: 12px;
        width: 0;
        height: 0;
        border-top: 8px solid transparent;
        border-bottom: 8px solid transparent;
        border-right: 10px solid var(--surface);
      }

      .ai-message-bubble .speech-bubble::after {
        content: '';
        position: absolute;
        left: -11px;
        top: 10px;
        width: 0;
        height: 0;
        border-top: 10px solid transparent;
        border-bottom: 10px solid transparent;
        border-right: 12px solid rgba(255, 255, 255, 0.3);
      }

      /* User message style */
      .user-message-bubble {
        background: linear-gradient(135deg, #ff0000, #cc0000);
        border-radius: 16px;
        border-bottom-right-radius: 4px;
        padding: 10px 14px;
        max-width: 85%;
        align-self: flex-end;
        font-size: 14px;
        line-height: 1.5;
        margin-left: 50px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
      }

      /* Typing indicator on avatar */
      .typing-indicator {
        position: absolute;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--surface);
        border-radius: 12px;
        padding: 4px 8px;
        display: flex;
        gap: 2px;
        border: 1px solid #404040;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .typing-indicator span {
        width: 4px;
        height: 4px;
        background: var(--ai-blue);
        border-radius: 50%;
        animation: typingBounce 1.4s infinite ease-in-out;
      }

      .typing-indicator span:nth-child(1) {
        animation-delay: -0.32s;
      }
      .typing-indicator span:nth-child(2) {
        animation-delay: -0.16s;
      }

      @keyframes typingBounce {
        0%,
        80%,
        100% {
          transform: scale(0);
          opacity: 0.5;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
        z-index: 1000;
      }

      .loading-overlay.active {
        display: flex;
      }

      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #404040;
        border-top-color: var(--ai-blue);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .quick-actions {
        display: flex;
        gap: 8px;
        padding: 10px 15px;
        background: var(--surface);
        border-bottom: 1px solid #404040;
        flex-wrap: wrap;
      }

      .quick-btn {
        background: #404040;
        color: var(--text);
        border: none;
        padding: 6px 12px;
        border-radius: 15px;
        cursor: pointer;
        font-size: 12px;
      }

      .quick-btn:hover {
        background: var(--ai-blue);
        color: #000;
      }

      .page-info {
        font-size: 12px;
        color: var(--text-secondary);
        padding: 8px 15px;
        background: var(--bg);
        border-bottom: 1px solid #404040;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="rev-avatar" id="browserLogo">
        <span
          style="
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 18px;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
          "
          >Rev</span
        >
      </div>
      <div class="header-title">
        <h1>Rev AI Browser</h1>
        <span>AI-powered browsing with continuous chat</span>
      </div>
      <div class="url-bar">
        <input
          type="text"
          class="url-input"
          id="urlInput"
          placeholder="Enter URL or search..."
        />
        <button class="go-btn" id="goBtn">Go</button>
      </div>
    </div>

    <div class="quick-actions">
      <button class="quick-btn" data-url="https://www.youtube.com">
        YouTube
      </button>
      <button class="quick-btn" data-url="https://mail.google.com">
        Gmail
      </button>
      <button class="quick-btn" data-url="https://wikipedia.org">
        Wikipedia
      </button>
      <button class="quick-btn" data-url="https://twitter.com">Twitter</button>
      <button class="quick-btn" data-url="https://reddit.com">Reddit</button>
      <button class="quick-btn" data-url="https://news.google.com">News</button>
      <button class="quick-btn summarize-btn" id="summarizeBtn">
        📝 Summarize Page
      </button>
    </div>

    <div class="main-container">
      <div class="browser-area">
        <webview
          id="browserFrame"
          src="about:blank"
          partition="persist:ai-browser"
          allowpopups="true"
        ></webview>
        <div class="page-info" id="pageInfo">Navigate to a page to start</div>
      </div>

      <div class="ai-chat-panel">
        <div class="chat-avatar-section">
          <canvas id="chat-avatar-canvas" class="chat-avatar-canvas"></canvas>
          <div class="chat-avatar-placeholder" id="chatAvatarPlaceholder">
            <div class="avatar-icon">R</div>
            <div>Avatar not loaded</div>
            <div style="font-size: 11px; margin-top: 5px">
              Upload in Avatar tab
            </div>
          </div>
        </div>

        <div class="chat-content">
          <div class="chat-header">
            <span style="font-size: 20px">🤖</span>
            <h2>Chat with Rev</h2>
            <label class="write-mode-toggle">
              <input type="checkbox" id="writeModeToggle" />
              <span>Write Mode</span>
            </label>
          </div>

          <div class="chat-messages" id="chatMessages">
            <div class="ai-message-bubble">
              <div class="speech-bubble">
                Hi! I'm Rev, your AI browsing assistant. Ask me anything about
                the current page or ask me to navigate somewhere!
              </div>
            </div>
          </div>

          <div class="chat-input-area">
            <textarea
              class="chat-input"
              id="chatInput"
              placeholder="Ask Rev about this page or what to do..."
            ></textarea>
            <button class="send-btn" id="sendBtn">Send</button>
          </div>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-indicator" id="statusIndicator"></div>
      <span id="statusText">Ready</span>
      <span id="urlText"></span>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <div id="loadingText">Loading...</div>
    </div>

    <script>
      const urlInput = document.getElementById('urlInput');
      const goBtn = document.getElementById('goBtn');
      const browserFrame = document.getElementById('browserFrame');
      const pageInfo = document.getElementById('pageInfo');
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      const chatMessages = document.getElementById('chatMessages');
      const statusIndicator = document.getElementById('statusIndicator');
      const statusText = document.getElementById('statusText');
      const urlText = document.getElementById('urlText');
      const loadingOverlay = document.getElementById('loadingOverlay');
      const loadingText = document.getElementById('loadingText');

      let currentUrl = 'about:blank';

      // Set up webview event listeners
      browserFrame.addEventListener('did-start-loading', () => {
        showLoading('Loading...');
      });

      browserFrame.addEventListener('did-stop-loading', () => {
        hideLoading();
        try {
          const url = browserFrame.getURL();
          if (url && url !== 'about:blank') {
            currentUrl = url;
            urlInput.value = url;
            const title = browserFrame.getTitle();
            pageInfo.textContent = 'Current page: ' + title;
            urlText.textContent = url;
            statusText.textContent = 'Page loaded';
            statusIndicator.classList.remove('error');
          }
        } catch (e) {
          console.log('Could not get webview info:', e);
        }
      });

      browserFrame.addEventListener('did-fail-load', (event) => {
        hideLoading();
        statusText.textContent = 'Failed to load: ' + event.errorDescription;
        statusIndicator.classList.add('error');
      });

      // Navigation
      async function navigateTo(url) {
        showLoading('Navigating...');

        // Clean up URL
        let finalUrl = url.trim().toLowerCase();
        if (
          !finalUrl.startsWith('http://') &&
          !finalUrl.startsWith('https://')
        ) {
          // Check if it looks like a domain
          if (finalUrl.includes('.') && !finalUrl.includes(' ')) {
            finalUrl = 'https://' + finalUrl;
          } else {
            // Search
            finalUrl =
              'https://www.google.com/search?q=' + encodeURIComponent(finalUrl);
          }
        }

        try {
          // Use webview's loadURL method - this loads the actual site
          browserFrame.loadURL(finalUrl);
          currentUrl = finalUrl;
          urlInput.value = finalUrl;
          pageInfo.textContent = 'Loading: ' + finalUrl;
          urlText.textContent = finalUrl;
          statusText.textContent = 'Loading...';
          statusIndicator.classList.remove('error');

          // Add AI message
          addMessage(
            'ai',
            `Navigating to ${finalUrl}. You can interact with the page directly while I help you!`
          );
        } catch (error) {
          hideLoading();
          statusText.textContent = 'Navigation failed: ' + error.message;
          statusIndicator.classList.add('error');
        }
      }

      goBtn.addEventListener('click', () => navigateTo(urlInput.value));
      urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') navigateTo(urlInput.value);
      });

      // Quick buttons
      document.querySelectorAll('.quick-btn').forEach((btn) => {
        if (btn.classList.contains('summarize-btn')) return; // Skip summarize button
        btn.addEventListener('click', () => navigateTo(btn.dataset.url));
      });

      // Summarize button - extracts page content and summarizes it
      document
        .getElementById('summarizeBtn')
        .addEventListener('click', async () => {
          addMessage('user', '📝 Summarize this page');
          setThinking(true);

          try {
            // First, extract content from the webview
            const extractResult = await browserFrame.executeJavaScript(`
            (function() {
              // Try to get the main content
              const selectors = ['article', 'main', '.content', '#content', '.post-content', '.article-content', '.entry-content'];
              let content = '';

              // Try structured content first
              for (const sel of selectors) {
                const el = document.querySelector(sel);
                if (el) {
                  content = el.innerText || el.textContent;
                  if (content.length > 100) break;
                }
              }

              // Fallback to body
              if (!content || content.length < 100) {
                content = document.body.innerText;
              }

              // Limit content to 8000 chars
              return content.substring(0, 8000);
            })()
          `);

            if (!extractResult || extractResult.length < 50) {
              addMessage(
                'ai',
                "I couldn't extract enough content from this page to summarize. Try a different page or ask me about specific content."
              );
              setThinking(false);
              return;
            }

            // Send to backend for summarization
            const response = await fetch(
              'http://localhost:4000/api/summarize-text',
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  text: extractResult,
                  url: currentUrl,
                  title: browserFrame.getTitle(),
                }),
              }
            );

            const result = await response.json();
            console.log('[Summarize] Result:', result);

            if (result.success && result.summary) {
              addMessage(
                'ai',
                '<strong>📝 Page Summary:</strong><br><br>' + result.summary
              );
            } else {
              addMessage(
                'ai',
                "Sorry, I couldn't summarize this page. " + (result.error || '')
              );
            }
          } catch (error) {
            console.error('[Summarize] Error:', error);
            addMessage(
              'ai',
              'Sorry, I encountered an error while summarizing: ' +
                error.message
            );
          }

          setThinking(false);
        });

      // Write mode toggle
      const writeModeToggle = document.getElementById('writeModeToggle');
      let writeModeEnabled = false;

      writeModeToggle.addEventListener('change', (e) => {
        writeModeEnabled = e.target.checked;
        if (writeModeEnabled) {
          writeModeToggle.parentElement.classList.add('active');
          addMessage(
            'ai',
            '🔴 <strong>Write Mode Enabled</strong><br>Rev can now fill forms and write content on websites. Disable this anytime to turn off writing capabilities.'
          );
        } else {
          writeModeToggle.parentElement.classList.remove('active');
          addMessage(
            'ai',
            '⚪ <strong>Write Mode Disabled</strong><br>Rev can no longer write content on websites.'
          );
        }
      });

      // Check for write intent in messages
      function detectWriteIntent(message) {
        const lower = message.toLowerCase();
        const writeKeywords = [
          'write',
          'post',
          'comment',
          'fill',
          'type',
          'enter',
          'submit',
          'send',
          'create',
          'reply',
        ];
        return writeKeywords.some((kw) => lower.includes(kw));
      }

      // Find form fields on the page
      async function findFormFields() {
        try {
          const result = await browserFrame.executeJavaScript(`
            (function() {
              const fields = [];
              const inputs = document.querySelectorAll('input, textarea, [contenteditable="true"]');

              inputs.forEach((input, i) => {
                // Skip hidden fields
                if (input.offsetParent === null) return;

                // Get field info
                const info = {
                  index: i,
                  type: input.tagName.toLowerCase(),
                  inputType: input.type || 'text',
                  name: input.name || input.id || '',
                  placeholder: input.placeholder || '',
                  label: ''
                };

                // Try to find label
                const labelEl = document.querySelector('label[for="' + input.id + '"]');
                if (labelEl) {
                  info.label = labelEl.innerText;
                } else {
                  // Try parent label
                  const parentLabel = input.closest('label');
                  if (parentLabel) {
                    info.label = parentLabel.innerText;
                  }
                }

                // Get bounding rect for visibility
                const rect = input.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0) {
                  fields.push(info);
                }
              });

              return fields.slice(0, 10); // Limit to 10 fields
            })()
          `);
          return result;
        } catch (e) {
          console.error('[Write] Error finding fields:', e);
          return [];
        }
      }
      async function sendMessage() {
        const message = chatInput.value.trim();
        if (!message) return;

        addMessage('user', message);
        chatInput.value = '';

        // Play a random chat animation
        playRandomChatAnimation();

        setThinking(true);

        // Check for write intent
        if (writeModeEnabled && detectWriteIntent(message)) {
          try {
            // Find form fields on the page
            const fields = await findFormFields();

            if (fields.length === 0) {
              addMessage(
                'ai',
                "I couldn't find any form fields on this page to write to. Try navigating to a page with a form first."
              );
              setThinking(false);
              return;
            }

            // Ask for confirmation before writing
            const fieldList = fields
              .map(
                (f, i) =>
                  `${i + 1}. ${f.label || f.name || f.inputType} (${f.type})`
              )
              .join('\n');
            addMessage(
              'ai',
              `<strong>Found ${fields.length} form fields:</strong>\n${fieldList}\n\nTo write "${message}", I need to know which field(s) to fill. Please confirm which field number or I'll fill the first text field.`
            );

            // For now, just fill the first text input as a demo
            const fillResult = await browserFrame.executeJavaScript(`
              (function() {
                const inputs = document.querySelectorAll('input:not([type=hidden]):not([type=submit]):not([type=button]), textarea');
                for (let input of inputs) {
                  if (input.offsetParent !== null && input.type !== 'submit' && input.type !== 'button') {
                    input.focus();
                    input.value = 'Test message from Rev - write mode working!';
                    input.dispatchEvent(new Event('input', {bubbles: true}));
                    input.dispatchEvent(new Event('change', {bubbles: true}));
                    return { success: true, field: input.name || input.id || 'text input' };
                  }
                }
                return { success: false, error: 'No suitable field found' };
              })()
            `);

            if (fillResult.success) {
              addMessage(
                'ai',
                `✅ <strong>Write Successful!</strong><br>I filled in the "${fillResult.field}" field. You can now review and submit the form manually, or ask me to submit it.`
              );
            } else {
              addMessage(
                'ai',
                "Sorry, I couldn't find a suitable field to write to: " +
                  fillResult.error
              );
            }
          } catch (error) {
            console.error('[Write] Error:', error);
            addMessage(
              'ai',
              'Sorry, I encountered an error while trying to write: ' +
                error.message
            );
          }

          setThinking(false);
          return;
        }

        // Normal chat - no write intent
        try {
          // Use IPC to execute AI command in webview directly
          const response = await fetch(
            'http://localhost:4000/api/ai-browser-command',
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ command: message }),
            }
          );

          const result = await response.json();
          console.log('[Chat] AI result:', result);

          // If executed actions, run them in the webview
          if (result.executed && result.actions) {
            // Check original message for navigation intent
            const msgLower = message.toLowerCase();

            // Always navigate if it's a search or YouTube command
            if (
              msgLower.includes('youtube') ||
              msgLower.includes('search') ||
              msgLower.includes('go to') ||
              msgLower.includes('navigate')
            ) {
              let url = 'https://www.youtube.com';

              if (msgLower.includes('youtube')) {
                const searchMatch =
                  message.match(/search\s+(.+?)(?:on|\s+youtube|$)/i) ||
                  message.match(/(?:youtube|yt)[\s:,-]*(.+)/i);
                if (searchMatch) {
                  let query = (searchMatch[1] || '')
                    .replace(
                      /^(go to|search|find|to|and|youtube|search youtube)\s*/gi,
                      ''
                    )
                    .replace(/youtube/gi, '')
                    .trim();
                  if (query) {
                    url = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
                  }
                }
              } else if (
                msgLower.includes('search') ||
                msgLower.includes('google')
              ) {
                let searchTerm = message
                  .replace(/search\s*(for)?\s*/i, '')
                  .replace(/google\s*/i, '')
                  .replace(/find\s*/i, '')
                  .replace(/youtube\s*/gi, '')
                  .trim();
                if (searchTerm) {
                  url = `https://www.google.com/search?q=${encodeURIComponent(searchTerm)}`;
                }
              } else if (
                msgLower.includes('go to') ||
                msgLower.includes('navigate')
              ) {
                const urlMatch = message.match(
                  /(?:go to|navigate to)\s+(https?:\/\/\S+|\S+\.\S+)/i
                );
                if (urlMatch) {
                  url = urlMatch[1].startsWith('http')
                    ? urlMatch[1]
                    : 'https://' + urlMatch[1];
                }
              }

              console.log('[Chat] Navigating to:', url);
              browserFrame.loadURL(url);

              // Wait for page to load then try to type search
              await new Promise((r) => setTimeout(r, 2000));

              // Try to type and search if it's a search command
              if (msgLower.includes('search')) {
                let searchTerm = '';
                const termMatch = message.match(
                  /search\s+(?:for\s+)?(.+?)(?:\s+on|\s+in|\s+at|\s+youtube|$)/i
                );
                if (termMatch) {
                  searchTerm = termMatch[1].trim();
                } else {
                  searchTerm = message
                    .replace(/search/i, '')
                    .replace(/youtube/gi, '')
                    .trim();
                }

                if (searchTerm) {
                  try {
                    await browserFrame.executeJavaScript(`
                      (function() {
                        const selectors = ['input[aria-label="Search"]', 'input[name="search"]', '#search-input',
                                          'input[type="search"]', 'input[type="text"]', 'ytd-searchbox input'];
                        for (const sel of selectors) {
                          const el = document.querySelector(sel);
                          if (el && el.offsetParent !== null) {
                            el.focus();
                            el.value = '${searchTerm.replace(/'/g, "\\'")}';
                            el.dispatchEvent(new Event('input', {bubbles:true}));
                            return true;
                          }
                        }
                        return false;
                      })();
                    `);

                    // Press Enter
                    await new Promise((r) => setTimeout(r, 500));
                    await browserFrame.executeJavaScript(`
                      (function() {
                        const inp = document.querySelector('input[aria-label="Search"], input[name="search"], #search-input');
                        if (inp) { inp.dispatchEvent(new KeyboardEvent('keydown', {key:'Enter', bubbles:true})); return true; }
                        return false;
                      })();
                    `);
                  } catch (e) {
                    console.log('Auto-search error:', e.message);
                  }
                }
              }
            }

            addMessage(
              'ai',
              result.response || 'Executed your request in the browser!'
            );

            // Show contextual information if available
            if (result.context) {
              setTimeout(() => {
                addMessage(
                  'ai',
                  '📚 <strong>Quick Context:</strong> ' + result.context
                );
              }, 500);
            }
          } else if (result.url) {
            // Navigate to URL - IMMEDIATELY
            browserFrame.loadURL(result.url);
            addMessage('ai', `Navigating to ${result.url}`);

            // Context loads ASYNC - pop up after
            if (result.context) {
              setTimeout(() => {
                addMessage(
                  'ai',
                  '📚 <strong>Quick Context:</strong> ' + result.context
                );
              }, 1500);
            } else {
              // Try to get context async if not provided
              fetchContextAsync(message);
            }
          } else if (result.response) {
            // Show AI response
            addMessage('ai', result.response);

            // Also show context if available
            if (result.context && result.context !== result.response) {
              setTimeout(() => {
                addMessage(
                  'ai',
                  '📚 <strong>Quick Context:</strong> ' + result.context
                );
              }, 500);
            }
          } else {
            addMessage(
              'ai',
              result.error || "I'm not sure how to help with that."
            );
          }
        } catch (error) {
          addMessage('ai', 'Sorry, I encountered an error: ' + error.message);
        }

        setThinking(false);
      }

      // Async function to fetch context after navigation
      async function fetchContextAsync(query) {
        try {
          const ctxResponse = await fetch(
            'http://localhost:4000/api/ai-context',
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ command: query }),
            }
          );
          const ctxResult = await ctxResponse.json();
          if (ctxResult.context) {
            setTimeout(() => {
              addMessage(
                'ai',
                '📚 <strong>Quick Context:</strong> ' + ctxResult.context
              );
            }, 1500);
          }
        } catch (e) {
          console.log('Context fetch error:', e);
        }
      }

      sendBtn.addEventListener('click', sendMessage);
      chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      function addMessage(type, content) {
        if (type === 'ai') {
          const div = document.createElement('div');
          div.className = 'ai-message-bubble';
          div.innerHTML = `
            <div class="avatar-container">
              <span style="font-weight: bold; font-size: 14px;">R</span>
            </div>
            <div class="speech-bubble">${content}</div>
          `;
          chatMessages.appendChild(div);
        } else {
          const div = document.createElement('div');
          div.className = 'user-message-bubble';
          div.textContent = content;
          chatMessages.appendChild(div);
        }
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function setThinking(thinking) {
        statusIndicator.classList.toggle('thinking', thinking);
        statusText.textContent = thinking ? 'Rev is thinking...' : 'Ready';
        sendBtn.disabled = thinking;
        const typingIndicator = document.getElementById('chatTypingIndicator');
        if (typingIndicator) {
          typingIndicator.style.display = thinking ? 'flex' : 'none';
        }
      }

      function showLoading(text) {
        loadingText.textContent = text;
        loadingOverlay.classList.add('active');
      }

      function hideLoading() {
        loadingOverlay.classList.remove('active');
      }

      // ==========================================
      // AVATAR LOADING AND ANIMATION
      // ==========================================

      let chatAvatarScene = null;
      let chatAvatarCamera = null;
      let chatAvatarRenderer = null;
      let chatAvatarEmotionState = null;
      let currentChatEmotion = 'idle';
      let chatAvatarMixer = null;
      let chatAvatarActions = {};
      let chatCurrentAction = null;

      async function initChatAvatar() {
        const canvas = document.getElementById('chat-avatar-canvas');
        const placeholder = document.getElementById('chatAvatarPlaceholder');
        if (!canvas) return;

        try {
          // Import Three.js and VRM modules
          const THREE = await import('three');
          const { GLTFLoader } =
            await import('three/addons/loaders/GLTFLoader.js');
          const { VRMLoaderPlugin } = await import('@pixiv/three-vrm');
          const { VRMAnimationLoaderPlugin, createVRMAnimationClip } =
            await import('@pixiv/three-vrm-animation');

          // Store for later use
          window._threeModules = {
            THREE,
            GLTFLoader,
            VRMLoaderPlugin,
            VRMAnimationLoaderPlugin,
            createVRMAnimationClip,
          };

          // Create scene
          chatAvatarScene = new THREE.Scene();
          chatAvatarScene.background = new THREE.Color(0x1a1a2e);

          // Camera - zoomed in on upper body (waist up)
          chatAvatarCamera = new THREE.PerspectiveCamera(
            35,
            canvas.clientWidth / canvas.clientHeight,
            0.1,
            100
          );
          chatAvatarCamera.position.set(0, 1.1, 2.2);
          chatAvatarCamera.lookAt(0, 1.0, 0);

          // Renderer
          chatAvatarRenderer = new THREE.WebGLRenderer({
            canvas,
            antialias: true,
            alpha: true,
          });
          chatAvatarRenderer.setSize(canvas.clientWidth, canvas.clientHeight);
          chatAvatarRenderer.setPixelRatio(
            Math.min(window.devicePixelRatio, 2)
          );

          // Lighting
          const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
          chatAvatarScene.add(ambientLight);

          const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
          keyLight.position.set(3, 5, 4);
          chatAvatarScene.add(keyLight);

          const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
          fillLight.position.set(-3, 2, -4);
          chatAvatarScene.add(fillLight);

          // Load VRM if available
          await loadChatAvatarVRM();

          // Start animation loop
          animateChatAvatar();

          console.log('[Chat Avatar] Initialized successfully');
        } catch (error) {
          console.error('[Chat Avatar] Failed to initialize:', error);
        }
      }

      async function loadChatAvatarVRM() {
        try {
          // Try to get saved avatar from main process
          if (window.electronAPI && window.electronAPI.getAvatarData) {
            const savedAvatar = await window.electronAPI.getAvatarData();
            if (savedAvatar && savedAvatar.fileName) {
              const vrmResult = await window.electronAPI.loadVrmFile(
                savedAvatar.fileName
              );
              if (vrmResult.success && vrmResult.dataUrl) {
                await loadVRMModel(vrmResult.dataUrl);
                return;
              }
            }
          }
          console.log('[Chat Avatar] No saved avatar found');
        } catch (error) {
          console.error('[Chat Avatar] Failed to load VRM:', error);
        }
      }

      async function loadVRMModel(vrmUrl) {
        const placeholder = document.getElementById('chatAvatarPlaceholder');
        const canvas = document.getElementById('chat-avatar-canvas');
        const { THREE, GLTFLoader, VRMLoaderPlugin } = window._threeModules;

        try {
          const loader = new GLTFLoader();
          loader.register((parser) => new VRMLoaderPlugin(parser));

          const gltf = await new Promise((resolve, reject) => {
            loader.load(vrmUrl, resolve, undefined, reject);
          });

          const vrm = gltf.userData.vrm;
          const model = vrm.scene;

          // Scale and position
          const box = new THREE.Box3().setFromObject(model);
          const size = box.getSize(new THREE.Vector3());
          const center = box.getCenter(new THREE.Vector3());

          model.position.x = -center.x;
          model.position.z = -center.z;
          model.position.y = -box.min.y + 0.1;

          const scale = 1.6 / size.y;
          model.scale.set(scale, scale, scale);

          // Enable VRM features
          vrm.humanoid?.update();
          vrm.springBoneManager?.reset();

          // Auto-blend shapes for expressions
          vrm.blendShapeProxy?.update();

          chatAvatarScene.add(model);

          // Create animation mixer
          chatAvatarMixer = new THREE.AnimationMixer(model);

          // Store state
          chatAvatarEmotionState = {
            vrm,
            model,
            scale,
          };

          // Load default animations
          loadChatAnimations();

          // Hide placeholder
          if (placeholder) placeholder.style.display = 'none';
          if (canvas) canvas.style.display = 'block';

          console.log('[Chat Avatar] VRM loaded successfully');
        } catch (error) {
          console.error('[Chat Avatar] Failed to load VRM model:', error);
        }
      }

      async function loadChatAnimations() {
        if (!chatAvatarEmotionState?.vrm) return;
        const {
          GLTFLoader,
          VRMLoaderPlugin,
          VRMAnimationLoaderPlugin,
          createVRMAnimationClip,
          THREE,
        } = window._threeModules;

        const basePath =
          window.location.origin +
          window.location.pathname.replace(/[^/]*$/, '');
        const animations = {
          'Standard Idle': 'StandardIdle.vrma',
          'Idle Dance': 'idle.vrma',
          Walk: 'Walk.vrma',
          Stretch: 'stretch.vrma',
          'V Sign': 'v_sign.vrma',
          Spin: 'spin.vrma',
          Wave: 'wave.vrma',
        };

        console.log(
          '[Chat Avatar] Loading animations from:',
          basePath + 'animations/'
        );

        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));
        loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

        for (const [name, filename] of Object.entries(animations)) {
          const url = basePath + 'animations/' + filename;
          try {
            console.log(`[Chat Avatar] Loading: ${name}`);
            const gltf = await loader.loadAsync(url);
            const vrmAnimations = gltf.userData.vrmAnimations;

            if (!vrmAnimations || vrmAnimations.length === 0) {
              console.log(`[Chat Avatar] No animations in: ${filename}`);
              continue;
            }

            const clip = createVRMAnimationClip(
              vrmAnimations[0],
              chatAvatarEmotionState.vrm
            );
            const action = chatAvatarMixer.clipAction(clip);
            action.setLoop(THREE.LoopRepeat);
            chatAvatarActions[name] = action;
            console.log(`[Chat Avatar] ✓ Loaded: ${name}`);
          } catch (e) {
            console.log(`[Chat Avatar] ✗ Failed: ${name} - ${e.message}`);
          }
        }

        // Start idle animation
        if (chatAvatarActions['Standard Idle']) {
          chatAvatarActions['Standard Idle'].play();
          chatCurrentAction = chatAvatarActions['Standard Idle'];
        }
      }

      function playChatAnimation(name, fadeTime = 0.3) {
        if (!chatAvatarMixer) return;

        const newAction = chatAvatarActions[name];
        if (!newAction) return;

        if (chatCurrentAction) {
          chatCurrentAction.fadeOut(fadeTime);
        }
        newAction.reset().fadeIn(fadeTime).play();
        chatCurrentAction = newAction;
      }

      let lastChatAnimation = null;

      function playRandomChatAnimation() {
        if (!chatAvatarMixer) return;

        const animationNames = Object.keys(chatAvatarActions);
        if (animationNames.length === 0) return;

        // Pick a random animation, preferring non-idle ones, avoiding repeat
        const nonIdleAnimations = animationNames.filter(
          (n) =>
            !n.toLowerCase().includes('idle') &&
            !n.toLowerCase().includes('walk')
        );

        const pool =
          nonIdleAnimations.length > 0 ? nonIdleAnimations : animationNames;

        // Filter out last animation to avoid repeat
        const available = pool.filter((n) => n !== lastChatAnimation);
        if (available.length === 0) return;

        const randomIndex = Math.floor(Math.random() * available.length);
        const animation = available[randomIndex];
        lastChatAnimation = animation;

        console.log('[Chat Avatar] Playing random:', animation);
        playChatAnimation(animation);

        // Return to idle after animation
        setTimeout(() => {
          if (chatAvatarActions['Standard Idle']) {
            playChatAnimation('Standard Idle');
          }
        }, 3000);
      }

      function setChatEmotion(emotion) {
        currentChatEmotion = emotion;

        // Play animation if available
        if (chatAvatarActions[emotion]) {
          playChatAnimation(emotion);
        }

        // Update emotion state for animation
        if (chatAvatarEmotionState) {
          chatAvatarEmotionState.targetEmotion = emotion;
        }

        console.log('[Chat Avatar] Emotion set to:', emotion);

        // Auto-return to idle after 5 seconds (except walking)
        if (emotion !== 'idle' && emotion !== 'walking') {
          setTimeout(() => {
            if (currentChatEmotion === emotion) {
              setChatEmotion('idle');
            }
          }, 5000);
        }
      }

      function animateChatAvatar() {
        if (!chatAvatarScene || !chatAvatarCamera || !chatAvatarRenderer)
          return;

        const clock =
          window._avatarClock ||
          (window._avatarClock = { lastTime: performance.now() });
        const now = performance.now();
        const delta = (now - clock.lastTime) / 1000;
        clock.lastTime = now;

        // Update animation mixer
        if (chatAvatarMixer) {
          chatAvatarMixer.update(delta);
        }

        // Update VRM systems
        if (chatAvatarEmotionState?.vrm) {
          const vrm = chatAvatarEmotionState.vrm;
          vrm.humanoid?.update();
          vrm.springBoneManager?.update(delta);
          vrm.blendShapeProxy?.update();
        }

        // Fallback procedural animation for bones
        if (chatAvatarEmotionState && !chatAvatarMixer) {
          const time = Date.now() * 0.001;
          const { model } = chatAvatarEmotionState;
          const emotion = currentChatEmotion;

          let breathe = 0;
          let lean = 0;
          let bodyScale = 1;

          switch (emotion) {
            case 'idle':
              breathe = Math.sin(time * 1.5) * 0.02;
              break;
            case 'thinking':
              breathe = Math.sin(time * 0.5) * 0.01;
              break;
            case 'excited':
              breathe = Math.sin(time * 4) * 0.15;
              lean = Math.sin(time * 4) * 0.1;
              bodyScale = 1 + Math.sin(time * 4) * 0.1;
              break;
            case 'angry':
              breathe = Math.sin(time * 2) * 0.05;
              lean = Math.sin(time * 2) * 0.08;
              break;
            case 'happy':
              breathe = Math.sin(time * 2.5) * 0.08;
              bodyScale = 1.05;
              break;
            case 'sad':
              breathe = Math.sin(time * 0.8) * 0.02;
              break;
          }

          if (model) {
            model.rotation.z = lean;
          }
        }

        chatAvatarRenderer.render(chatAvatarScene, chatAvatarCamera);
        requestAnimationFrame(animateChatAvatar);
      }

      // Initialize avatar on load
      initChatAvatar();
    </script>
  </body>
</html>
