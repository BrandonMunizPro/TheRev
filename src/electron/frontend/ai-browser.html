<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rev AI Browser</title>
    <style>
      :root {
        --primary: #ff0000;
        --secondary: #000000;
        --accent: #ffffff;
        --bg: #1a1a1a;
        --surface: #2d2d2d;
        --text: #ffffff;
        --text-secondary: #b0b0b0;
        --ai-blue: #00ccff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: var(--surface);
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        border-bottom: 1px solid #404040;
        z-index: 100;
      }

      .rev-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), #ff6600);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: bold;
        border: 2px solid var(--accent);
        box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
      }

      .header-title {
        flex: 1;
      }
      .header-title h1 {
        font-size: 18px;
        color: var(--primary);
        margin: 0;
      }
      .header-title span {
        font-size: 11px;
        color: var(--text-secondary);
      }

      .url-bar {
        flex: 2;
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .url-input {
        flex: 1;
        background: var(--bg);
        border: 1px solid #404040;
        color: var(--text);
        padding: 10px 15px;
        border-radius: 8px;
        font-size: 14px;
      }

      .url-input:focus {
        outline: none;
        border-color: var(--primary);
      }

      .go-btn {
        background: var(--primary);
        border: none;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }

      .main-container {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      .browser-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .browser-frame {
        flex: 1;
        border: none;
        width: 100%;
        background: white;
      }

      webview {
        flex: 1;
        width: 100%;
        border: none;
        background: white;
      }

      .ai-chat-panel {
        width: 350px;
        background: var(--surface);
        border-left: 1px solid #404040;
        display: flex;
        flex-direction: column;
      }

      .chat-header {
        padding: 15px;
        border-bottom: 1px solid #404040;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .chat-header h2 {
        font-size: 16px;
        color: var(--ai-blue);
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .message {
        padding: 12px 15px;
        border-radius: 12px;
        max-width: 90%;
        font-size: 14px;
        line-height: 1.5;
      }

      .message.user {
        background: var(--primary);
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }

      .message.ai {
        background: var(--surface);
        border: 1px solid #404040;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }

      .message.ai .avatar {
        display: inline-block;
        margin-right: 8px;
      }

      .chat-input-area {
        padding: 15px;
        border-top: 1px solid #404040;
        display: flex;
        gap: 10px;
      }

      .chat-input {
        flex: 1;
        background: var(--bg);
        border: 1px solid #404040;
        color: var(--text);
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        resize: none;
        min-height: 50px;
        max-height: 120px;
      }

      .chat-input:focus {
        outline: none;
        border-color: var(--ai-blue);
      }

      .send-btn {
        background: var(--ai-blue);
        border: none;
        color: #000;
        padding: 12px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        align-self: flex-end;
      }

      .send-btn:hover {
        background: #00aadd;
      }

      .status-bar {
        background: var(--surface);
        padding: 8px 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        font-size: 12px;
        color: var(--text-secondary);
        border-top: 1px solid #404040;
      }

      .status-indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #00ff00;
      }
      .status-indicator.error {
        background: #ff0000;
      }
      .status-indicator.thinking {
        background: #ffa500;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
        z-index: 1000;
      }

      .loading-overlay.active {
        display: flex;
      }

      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #404040;
        border-top-color: var(--ai-blue);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .quick-actions {
        display: flex;
        gap: 8px;
        padding: 10px 15px;
        background: var(--surface);
        border-bottom: 1px solid #404040;
        flex-wrap: wrap;
      }

      .quick-btn {
        background: #404040;
        color: var(--text);
        border: none;
        padding: 6px 12px;
        border-radius: 15px;
        cursor: pointer;
        font-size: 12px;
      }

      .quick-btn:hover {
        background: var(--ai-blue);
        color: #000;
      }

      .page-info {
        font-size: 12px;
        color: var(--text-secondary);
        padding: 8px 15px;
        background: var(--bg);
        border-bottom: 1px solid #404040;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="rev-avatar">R</div>
      <div class="header-title">
        <h1>Rev AI Browser</h1>
        <span>AI-powered browsing with continuous chat</span>
      </div>
      <div class="url-bar">
        <input
          type="text"
          class="url-input"
          id="urlInput"
          placeholder="Enter URL or search..."
        />
        <button class="go-btn" id="goBtn">Go</button>
      </div>
    </div>

    <div class="quick-actions">
      <button class="quick-btn" data-url="https://www.youtube.com">
        YouTube
      </button>
      <button class="quick-btn" data-url="https://mail.google.com">
        Gmail
      </button>
      <button class="quick-btn" data-url="https://wikipedia.org">
        Wikipedia
      </button>
      <button class="quick-btn" data-url="https://twitter.com">Twitter</button>
      <button class="quick-btn" data-url="https://reddit.com">Reddit</button>
      <button class="quick-btn" data-url="https://news.google.com">News</button>
    </div>

    <div class="main-container">
      <div class="browser-area">
        <webview
          id="browserFrame"
          src="about:blank"
          partition="persist:ai-browser"
          allowpopups="true"
        ></webview>
        <div class="page-info" id="pageInfo">Navigate to a page to start</div>
      </div>

      <div class="ai-chat-panel">
        <div class="chat-header">
          <span style="font-size: 20px">🤖</span>
          <h2>Chat with Rev</h2>
        </div>

        <div class="chat-messages" id="chatMessages">
          <div class="message ai">
            <span class="avatar">🤖</span>
            Hi! I'm Rev, your AI browsing assistant. Ask me anything about the
            current page or ask me to navigate somewhere!
          </div>
        </div>

        <div class="chat-input-area">
          <textarea
            class="chat-input"
            id="chatInput"
            placeholder="Ask Rev about this page or what to do..."
          ></textarea>
          <button class="send-btn" id="sendBtn">Send</button>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-indicator" id="statusIndicator"></div>
      <span id="statusText">Ready</span>
      <span id="urlText"></span>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <div id="loadingText">Loading...</div>
    </div>

    <script>
      const urlInput = document.getElementById('urlInput');
      const goBtn = document.getElementById('goBtn');
      const browserFrame = document.getElementById('browserFrame');
      const pageInfo = document.getElementById('pageInfo');
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      const chatMessages = document.getElementById('chatMessages');
      const statusIndicator = document.getElementById('statusIndicator');
      const statusText = document.getElementById('statusText');
      const urlText = document.getElementById('urlText');
      const loadingOverlay = document.getElementById('loadingOverlay');
      const loadingText = document.getElementById('loadingText');

      let currentUrl = 'about:blank';

      // Set up webview event listeners
      browserFrame.addEventListener('did-start-loading', () => {
        showLoading('Loading...');
      });

      browserFrame.addEventListener('did-stop-loading', () => {
        hideLoading();
        try {
          const url = browserFrame.getURL();
          if (url && url !== 'about:blank') {
            currentUrl = url;
            urlInput.value = url;
            const title = browserFrame.getTitle();
            pageInfo.textContent = 'Current page: ' + title;
            urlText.textContent = url;
            statusText.textContent = 'Page loaded';
            statusIndicator.classList.remove('error');
          }
        } catch (e) {
          console.log('Could not get webview info:', e);
        }
      });

      browserFrame.addEventListener('did-fail-load', (event) => {
        hideLoading();
        statusText.textContent = 'Failed to load: ' + event.errorDescription;
        statusIndicator.classList.add('error');
      });

      // Navigation
      async function navigateTo(url) {
        showLoading('Navigating...');

        // Clean up URL
        let finalUrl = url.trim().toLowerCase();
        if (
          !finalUrl.startsWith('http://') &&
          !finalUrl.startsWith('https://')
        ) {
          // Check if it looks like a domain
          if (finalUrl.includes('.') && !finalUrl.includes(' ')) {
            finalUrl = 'https://' + finalUrl;
          } else {
            // Search
            finalUrl =
              'https://www.google.com/search?q=' + encodeURIComponent(finalUrl);
          }
        }

        try {
          // Use webview's loadURL method - this loads the actual site
          browserFrame.loadURL(finalUrl);
          currentUrl = finalUrl;
          urlInput.value = finalUrl;
          pageInfo.textContent = 'Loading: ' + finalUrl;
          urlText.textContent = finalUrl;
          statusText.textContent = 'Loading...';
          statusIndicator.classList.remove('error');

          // Add AI message
          addMessage(
            'ai',
            `Navigating to ${finalUrl}. You can interact with the page directly while I help you!`
          );
        } catch (error) {
          hideLoading();
          statusText.textContent = 'Navigation failed: ' + error.message;
          statusIndicator.classList.add('error');
        }
      }

      goBtn.addEventListener('click', () => navigateTo(urlInput.value));
      urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') navigateTo(urlInput.value);
      });

      // Quick buttons
      document.querySelectorAll('.quick-btn').forEach((btn) => {
        btn.addEventListener('click', () => navigateTo(btn.dataset.url));
      });

      // Chat with AI
      async function sendMessage() {
        const message = chatInput.value.trim();
        if (!message) return;

        addMessage('user', message);
        chatInput.value = '';

        setThinking(true);

        try {
          // Use IPC to execute AI command in webview directly
          const response = await fetch(
            'http://localhost:4000/api/ai-browser-command',
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ command: message }),
            }
          );

          const result = await response.json();
          console.log('[Chat] AI result:', result);

          // If executed actions, run them in the webview
          if (result.executed && result.actions) {
            // Check original message for navigation intent
            const msgLower = message.toLowerCase();

            // Always navigate if it's a search or YouTube command
            if (
              msgLower.includes('youtube') ||
              msgLower.includes('search') ||
              msgLower.includes('go to') ||
              msgLower.includes('navigate')
            ) {
              let url = 'https://www.youtube.com';

              if (msgLower.includes('youtube')) {
                const searchMatch =
                  message.match(/search\s+(.+?)(?:on|\s+youtube|$)/i) ||
                  message.match(/(?:youtube|yt)[\s:,-]*(.+)/i);
                if (searchMatch) {
                  let query = (searchMatch[1] || '')
                    .replace(
                      /^(go to|search|find|to|and|youtube|search youtube)\s*/gi,
                      ''
                    )
                    .replace(/youtube/gi, '')
                    .trim();
                  if (query) {
                    url = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
                  }
                }
              } else if (
                msgLower.includes('search') ||
                msgLower.includes('google')
              ) {
                let searchTerm = message
                  .replace(/search\s*(for)?\s*/i, '')
                  .replace(/google\s*/i, '')
                  .replace(/find\s*/i, '')
                  .replace(/youtube\s*/gi, '')
                  .trim();
                if (searchTerm) {
                  url = `https://www.google.com/search?q=${encodeURIComponent(searchTerm)}`;
                }
              } else if (
                msgLower.includes('go to') ||
                msgLower.includes('navigate')
              ) {
                const urlMatch = message.match(
                  /(?:go to|navigate to)\s+(https?:\/\/\S+|\S+\.\S+)/i
                );
                if (urlMatch) {
                  url = urlMatch[1].startsWith('http')
                    ? urlMatch[1]
                    : 'https://' + urlMatch[1];
                }
              }

              console.log('[Chat] Navigating to:', url);
              browserFrame.loadURL(url);

              // Wait for page to load then try to type search
              await new Promise((r) => setTimeout(r, 2000));

              // Try to type and search if it's a search command
              if (msgLower.includes('search')) {
                let searchTerm = '';
                const termMatch = message.match(
                  /search\s+(?:for\s+)?(.+?)(?:\s+on|\s+in|\s+at|\s+youtube|$)/i
                );
                if (termMatch) {
                  searchTerm = termMatch[1].trim();
                } else {
                  searchTerm = message
                    .replace(/search/i, '')
                    .replace(/youtube/gi, '')
                    .trim();
                }

                if (searchTerm) {
                  try {
                    await browserFrame.executeJavaScript(`
                      (function() {
                        const selectors = ['input[aria-label="Search"]', 'input[name="search"]', '#search-input', 
                                          'input[type="search"]', 'input[type="text"]', 'ytd-searchbox input'];
                        for (const sel of selectors) {
                          const el = document.querySelector(sel);
                          if (el && el.offsetParent !== null) {
                            el.focus();
                            el.value = '${searchTerm.replace(/'/g, "\\'")}';
                            el.dispatchEvent(new Event('input', {bubbles:true}));
                            return true;
                          }
                        }
                        return false;
                      })();
                    `);

                    // Press Enter
                    await new Promise((r) => setTimeout(r, 500));
                    await browserFrame.executeJavaScript(`
                      (function() {
                        const inp = document.querySelector('input[aria-label="Search"], input[name="search"], #search-input');
                        if (inp) { inp.dispatchEvent(new KeyboardEvent('keydown', {key:'Enter', bubbles:true})); return true; }
                        return false;
                      })();
                    `);
                  } catch (e) {
                    console.log('Auto-search error:', e.message);
                  }
                }
              }
            }

            addMessage(
              'ai',
              result.response || 'Executed your request in the browser!'
            );

            // Show contextual information if available
            if (result.context) {
              setTimeout(() => {
                addMessage(
                  'ai',
                  '📚 <strong>Quick Context:</strong> ' + result.context
                );
              }, 500);
            }
          } else if (result.url) {
            // Navigate to URL
            browserFrame.loadURL(result.url);
            addMessage('ai', `Navigating to ${result.url}`);
          } else if (result.response) {
            // Show AI response
            addMessage('ai', result.response);
          } else {
            addMessage(
              'ai',
              result.error || "I'm not sure how to help with that."
            );
          }
        } catch (error) {
          addMessage('ai', 'Sorry, I encountered an error: ' + error.message);
        }

        setThinking(false);
      }

      sendBtn.addEventListener('click', sendMessage);
      chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      function addMessage(type, content) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML =
          type === 'ai' ? `<span class="avatar">🤖</span>${content}` : content;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function setThinking(thinking) {
        statusIndicator.classList.toggle('thinking', thinking);
        statusText.textContent = thinking ? 'Rev is thinking...' : 'Ready';
        sendBtn.disabled = thinking;
      }

      function showLoading(text) {
        loadingText.textContent = text;
        loadingOverlay.classList.add('active');
      }

      function hideLoading() {
        loadingOverlay.classList.remove('active');
      }
    </script>
  </body>
</html>
