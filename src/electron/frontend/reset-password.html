<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - TheRev</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        margin: 0;
        padding: 20px;
      }
      .container {
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        max-width: 400px;
      }
      h1 {
        margin-bottom: 20px;
      }
      p {
        margin-bottom: 20px;
        color: #ccc;
      }
      .btn {
        background: #4a90d9;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      }
      .btn:hover {
        background: #357abd;
      }
      .success {
        color: #4caf50;
      }
      .error {
        color: #f44336;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>TheRev</h1>
      <p id="message">Opening TheRev app...</p>
      <button id="openApp" class="btn" style="display: none">
        Open TheRev App
      </button>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get('resetToken');

      if (!token) {
        document.getElementById('message').textContent = 'Invalid reset link';
        document.getElementById('message').className = 'error';
      } else {
        // Store token in localStorage for the app to pick up
        localStorage.setItem('therev_reset_token', token);

        // Try to open the app
        document.getElementById('message').textContent =
          'Opening TheRev app...';

        // Try to focus the existing app or open new one
        const openBtn = document.getElementById('openApp');
        openBtn.style.display = 'inline-block';
        openBtn.onclick = function () {
          // Try custom protocol
          window.location.href = 'therev://reset_password?token=' + token;
          // Fallback: show message
          setTimeout(() => {
            document.getElementById('message').textContent =
              'Please open TheRev app manually';
          }, 1000);
        };

        // Auto-try to open app
        setTimeout(() => {
          window.location.href = 'therev://reset_password?token=' + token;
        }, 500);
      }
    </script>
  </body>
</html>
