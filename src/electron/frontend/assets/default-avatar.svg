<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b5563;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Robot Head -->
  <rect x="15" y="15" width="70" height="70" rx="12" fill="url(#headGrad)" stroke="#374151" stroke-width="2"/>
  
  <!-- Antenna -->
  <line x1="50" y1="15" x2="50" y2="5" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="5" r="4" fill="#ef4444"/>
  
  <!-- Eyes -->
  <circle cx="35" cy="45" r="10" fill="url(#eyeGrad)"/>
  <circle cx="65" cy="45" r="10" fill="url(#eyeGrad)"/>
  <circle cx="37" cy="43" r="3" fill="white" opacity="0.8"/>
  <circle cx="67" cy="43" r="3" fill="white" opacity="0.8"/>
  
  <!-- Mouth -->
  <rect x="35" y="65" width="30" height="8" rx="4" fill="#374151"/>
  <rect x="37" y="67" width="6" height="4" rx="1" fill="#9ca3af"/>
  <rect x="45" y="67" width="6" height="4" rx="1" fill="#9ca3af"/>
  <rect x="53" y="67" width="6" height="4" rx="1" fill="#9ca3af"/>
  
  <!-- Ears/Antennae -->
  <rect x="8" y="40" width="7" height="20" rx="3" fill="#4b5563"/>
  <rect x="85" y="40" width="7" height="20" rx="3" fill="#4b5563"/>
</svg>
